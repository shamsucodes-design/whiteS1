<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Calculator</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            padding: 28px 26px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #ff5f6d, #ffc371);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: filter 0.2s ease;
        }

        button:hover {
            filter: brightness(1.05);
        }

        #result {
            margin-top: 16px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class=" Shamsu's calculator">
        <h2> Shamsu's Love Calculator</h2>
        <input type="text" id="name1" placeholder="Your Name">
        <input type="text" id="name2" placeholder="Their Name">
        <button id="calcBtn">Calculate Love</button>
        <div id="result">Result will appear here</div>
    </div>

    <script>
        const name1Input = document.getElementById("name1");
        const name2Input = document.getElementById("name2");
        const calcBtn = document.getElementById("calcBtn");
        const resultDiv = document.getElementById("result");

        function getLoveScore(nameA, nameB) {
            // Deterministic score based on input so it doesn't change on every click
            const seed = (nameA + "|" + nameB).toLowerCase().split("").reduce((acc, ch) => acc + ch.charCodeAt(0), 0);
            const pseudoRandom = Math.abs(Math.sin(seed)) * 100;
            return Math.floor(pseudoRandom) + 1;
        }

        function renderResult(score, nameA, nameB) {
            if (!nameA || !nameB) {
                resultDiv.textContent = "Please enter both names to see your love score.";
                return;
            }

            resultDiv.textContent = `${nameA} ❤️ ${nameB} has a love score of ${score}%`;
        }

        calcBtn.addEventListener("click", () => {
            const nameA = name1Input.value.trim();
            const nameB = name2Input.value.trim();
            const score = getLoveScore(nameA, nameB);
            renderResult(score, nameA, nameB);
        });
    </script>
</body>

</html>
